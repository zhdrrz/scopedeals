name: Weekly Price Update & Deploy

on:
  schedule:
    # Runs every Monday and Thursday at 6:00 AM UTC
    - cron: '0 6 * * 1,4'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml python-amazon-paapi

      - name: Run price updater
        env:
          AMAZON_CREDENTIAL_ID: ${{ secrets.AMAZON_CREDENTIAL_ID }}
          AMAZON_CREDENTIAL_SECRET: ${{ secrets.AMAZON_CREDENTIAL_SECRET }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          AMAZON_COUNTRY: "US"
        run: python scripts/update_prices.py

      - name: Build site from data
        run: python scripts/build_site.py

      - name: Commit updated data (if changed)
        run: |
          git config user.name "ScopeDeals Bot"
          git config user.email "bot@scopedeals.com"
          git add data/products.json data/price_history.json
          git diff --staged --quiet || git commit -m "Auto-update prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './public'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
